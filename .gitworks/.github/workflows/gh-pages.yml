name: Build and Deploy
on:
  push:
    branches:
      - me
jobs:
  deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
      
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.3.3
        with:
          branch: me
          folder: .
          ssh-key: ${{ secrets.DEPLOY_KEY }}